<style>
/* ════════════════════════════════════
   THEME SYSTEM  (Feature 1)
════════════════════════════════════ */
/* LIGHT */
:root,[data-theme="light"]{
  --bg:#f4f6fb; --surf:#fff; --surf2:#f8faff; --surf3:#eef1f8;
  --border:#e1e6f0; --border2:#cdd4e8;
  --blue:#1a6ef5; --blue2:#0f56d6; --bdim:rgba(26,110,245,.09); --bglow:rgba(26,110,245,.22);
  --green:#059669; --red:#dc2626; --amber:#d97706; --purple:#7c3aed; --teal:#0891b2;
  --text:#1a202c; --sub:#4a5568; --muted:#9ca3af;
  --shadow-sm:0 1px 3px rgba(0,0,0,.08); --shadow:0 4px 16px rgba(0,0,0,.09);
  --shadow-lg:0 20px 60px rgba(0,0,0,.12); --shadow-b:0 6px 24px rgba(26,110,245,.28);
  --topbg:#fff; --sidebg:#fff;
  color-scheme:light;
}
/* DARK */
[data-theme="dark"]{
  --bg:#0d1117; --surf:#161b27; --surf2:#111520; --surf3:#1c2235;
  --border:#232d44; --border2:#2c3858;
  --blue:#4d8ef7; --blue2:#6aa0f9; --bdim:rgba(77,142,247,.12); --bglow:rgba(77,142,247,.25);
  --green:#22c55e; --red:#f87171; --amber:#fbbf24; --purple:#a78bfa; --teal:#22d3ee;
  --text:#e2e8f8; --sub:#94a3c8; --muted:#4a5580;
  --shadow-sm:0 1px 3px rgba(0,0,0,.3); --shadow:0 4px 16px rgba(0,0,0,.35);
  --shadow-lg:0 20px 60px rgba(0,0,0,.55); --shadow-b:0 6px 24px rgba(77,142,247,.3);
  --topbg:#111520; --sidebg:#111520;
  color-scheme:dark;
}
/* AUTO = follow OS */
@media(prefers-color-scheme:dark){
  [data-theme="auto"]{
    --bg:#0d1117; --surf:#161b27; --surf2:#111520; --surf3:#1c2235;
    --border:#232d44; --border2:#2c3858;
    --blue:#4d8ef7; --blue2:#6aa0f9; --bdim:rgba(77,142,247,.12); --bglow:rgba(77,142,247,.25);
    --green:#22c55e; --red:#f87171; --amber:#fbbf24; --purple:#a78bfa; --teal:#22d3ee;
    --text:#e2e8f8; --sub:#94a3c8; --muted:#4a5580;
    --shadow-sm:0 1px 3px rgba(0,0,0,.3); --shadow:0 4px 16px rgba(0,0,0,.35);
    --shadow-lg:0 20px 60px rgba(0,0,0,.55); --shadow-b:0 6px 24px rgba(77,142,247,.3);
    --topbg:#111520; --sidebg:#111520;
    color-scheme:dark;
  }
}

/* ════ BASE ════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;transition:background .25s,color .25s}
.hidden{display:none!important}
button,input,select,textarea{font-family:'Inter',sans-serif}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--surf2)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}

/* ════ ANIMATIONS ════ */
@keyframes fadeIn  {from{opacity:0}to{opacity:1}}
@keyframes slideUp {from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideDown{from{opacity:0;transform:translateY(-16px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideLeft{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
@keyframes float   {0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes spin    {to{transform:rotate(360deg)}}
@keyframes pulse   {0%,100%{opacity:1}50%{opacity:.5}}
@keyframes gradMove{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@keyframes dotBounce{0%,80%,100%{transform:scale(0)}40%{transform:scale(1)}}
.anim-up  {animation:slideUp .4s ease both}
.anim-up1 {animation:slideUp .4s .07s ease both}
.anim-up2 {animation:slideUp .4s .14s ease both}
.anim-up3 {animation:slideUp .4s .21s ease both}
.anim-fade{animation:fadeIn .4s ease both}
.anim-float{animation:float 4s ease-in-out infinite}

/* ════ INPUTS ════ */
.inp{width:100%;padding:11px 15px;background:var(--surf);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-size:.9rem;outline:none;transition:all .2s}
.inp:focus{border-color:var(--blue);box-shadow:0 0 0 3px var(--bdim)}
.inp:hover:not(:focus){border-color:var(--border2)}
.inp::placeholder{color:var(--muted)}
.inp-sel{width:100%;padding:11px 14px;background:var(--surf);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-size:.88rem;outline:none;cursor:pointer;transition:all .2s}
.inp-sel:focus{border-color:var(--blue)}
.inp-sel option{background:var(--surf)}
.lbl{display:block;font-size:.74rem;font-weight:600;color:var(--sub);margin-bottom:6px;letter-spacing:.3px}
.form-g{margin-bottom:15px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:13px}
.pw-wrap{position:relative}
.pw-wrap .inp{padding-right:46px}
.pwtog{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--muted);font-size:.95rem;padding:4px;border-radius:6px;transition:all .15s}
.pwtog:hover{color:var(--blue);background:var(--bdim)}

/* ════ BUTTONS ════ */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:11px 22px;border-radius:10px;font-weight:600;font-size:.88rem;cursor:pointer;border:none;transition:all .2s;position:relative;overflow:hidden}
.btn-primary{background:var(--blue);color:#fff;box-shadow:var(--shadow-b)}
.btn-primary:hover{background:var(--blue2);transform:translateY(-1px);box-shadow:0 10px 30px var(--bglow)}
.btn-primary:active{transform:translateY(0)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}
.btn-outline{background:var(--surf);color:var(--blue);border:1.5px solid var(--blue)}
.btn-outline:hover{background:var(--bdim)}
.btn-ghost{background:transparent;color:var(--sub);border:1.5px solid var(--border)}
.btn-ghost:hover{background:var(--surf3);border-color:var(--border2);color:var(--text)}
.btn-danger{background:rgba(220,38,38,.07);color:var(--red);border:1.5px solid rgba(220,38,38,.3)}
.btn-danger:hover{background:rgba(220,38,38,.14)}
.btn-full{width:100%}
.btn-sm{padding:8px 15px;font-size:.81rem}

/* ════ STRENGTH BAR ════ */
.str-track{height:4px;background:var(--surf3);border-radius:4px;margin-top:7px;overflow:hidden}
.str-fill{height:100%;border-radius:4px;width:0;transition:width .35s,background .35s}
.str-fill.s1{width:25%;background:#f87171}
.str-fill.s2{width:50%;background:#fbbf24}
.str-fill.s3{width:75%;background:#86efac}
.str-fill.s4{width:100%;background:var(--green)}
.str-hint{font-size:.7rem;color:var(--muted);margin-top:4px;min-height:14px;font-weight:500}

/* ════ MSG ════ */
.msg{padding:11px 15px;border-radius:9px;font-size:.84rem;margin-bottom:13px;line-height:1.5;display:none;animation:slideDown .3s ease}
.msg.error  {background:rgba(220,38,38,.08);border:1px solid rgba(220,38,38,.25);color:var(--red);display:block}
.msg.success{background:rgba(5,150,105,.08);border:1px solid rgba(5,150,105,.25);color:var(--green);display:block}
.msg.info   {background:var(--bdim);border:1px solid rgba(26,110,245,.25);color:var(--blue);display:block}
.msg.warn   {background:rgba(217,119,6,.08);border:1px solid rgba(217,119,6,.25);color:var(--amber);display:block}

/* ════ SPINNER ════ */
.spin-el{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
.spin-blue{border-color:var(--bdim);border-top-color:var(--blue)}

/* ════ BADGE ════ */
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:.7rem;font-weight:600}
.badge-blue  {background:var(--bdim);color:var(--blue);border:1px solid rgba(26,110,245,.2)}
.badge-green {background:rgba(5,150,105,.08);color:var(--green);border:1px solid rgba(5,150,105,.25)}
.badge-red   {background:rgba(220,38,38,.08);color:var(--red);border:1px solid rgba(220,38,38,.25)}
.badge-amber {background:rgba(217,119,6,.08);color:var(--amber);border:1px solid rgba(217,119,6,.25)}
.sep{height:1px;background:var(--border);margin:18px 0}

/* ════════════════════════════════════
   LOADING SCREEN
════════════════════════════════════ */
#view-loading{position:fixed;inset:0;background:var(--surf);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:background .25s}
.load-logo{display:flex;align-items:center;gap:12px;margin-bottom:28px;animation:fadeIn .5s ease}
.load-ico{width:50px;height:50px;background:var(--blue);border-radius:13px;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow-b)}
.load-ico svg{width:28px;height:28px;fill:#fff}
.load-name{font-size:1.7rem;font-weight:800;color:var(--text)}
.load-dots{display:flex;gap:7px}
.load-dot{width:10px;height:10px;border-radius:50%;background:var(--blue);animation:dotBounce 1.4s ease-in-out infinite both}
.load-dot:nth-child(1){animation-delay:-.32s}
.load-dot:nth-child(2){animation-delay:-.16s}

/* ════════════════════════════════════
   AUTH VIEW
════════════════════════════════════ */
#view-auth{min-height:100vh;display:flex;background:var(--surf)}
.auth-left{
  flex:1;display:flex;flex-direction:column;justify-content:center;align-items:flex-start;
  padding:60px 64px;position:relative;overflow:hidden;
  background:linear-gradient(135deg,#0f1629 0%,#1a1f36 50%,#1e3a6e 100%);
}
.auth-left-grad{position:absolute;inset:0;background:radial-gradient(ellipse 60% 60% at 20% 40%,rgba(26,110,245,.22) 0%,transparent 70%),radial-gradient(ellipse 40% 50% at 80% 70%,rgba(124,58,237,.14) 0%,transparent 60%);animation:gradMove 9s ease infinite;background-size:200% 200%}
.auth-left-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);background-size:54px 54px}
.auth-sh{position:absolute;border-radius:50%;filter:blur(80px);opacity:.35;pointer-events:none}
.auth-sh-1{width:400px;height:400px;background:rgba(26,110,245,.2);top:-80px;right:-80px;animation:float 9s ease-in-out infinite}
.auth-sh-2{width:280px;height:280px;background:rgba(124,58,237,.16);bottom:-60px;left:30%;animation:float 11s ease-in-out infinite reverse}
.auth-lc{position:relative;z-index:1;width:100%;max-width:480px}
.auth-pbadge{display:inline-flex;align-items:center;gap:8px;padding:7px 15px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);border-radius:20px;font-size:.77rem;font-weight:600;color:rgba(255,255,255,.85);margin-bottom:28px;backdrop-filter:blur(10px);animation:slideDown .5s ease}
.auth-pdot{width:7px;height:7px;border-radius:50%;background:#22c55e;box-shadow:0 0 8px #22c55e;animation:pulse 2s infinite}
.auth-hl{font-size:2.7rem;font-weight:800;color:#fff;line-height:1.2;margin-bottom:14px;letter-spacing:-.5px;animation:slideUp .5s .1s ease both}
.auth-hl em{background:linear-gradient(135deg,#60a5fa,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;font-style:normal}
.auth-desc{color:rgba(255,255,255,.55);font-size:.97rem;line-height:1.75;margin-bottom:36px;animation:slideUp .5s .2s ease both}
.auth-chips{display:flex;flex-direction:column;gap:10px;animation:slideUp .5s .3s ease both}
.auth-chip{display:flex;align-items:center;gap:13px;padding:13px 16px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:13px;transition:all .22s}
.auth-chip:hover{background:rgba(255,255,255,.09);border-color:rgba(255,255,255,.18);transform:translateX(4px)}
.auth-chip-ico{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:1.05rem;flex-shrink:0}
.auth-chip-ico.blue{background:rgba(96,165,250,.18)}
.auth-chip-ico.green{background:rgba(74,222,128,.18)}
.auth-chip-ico.purple{background:rgba(167,139,250,.18)}
.auth-chip-ico.teal{background:rgba(34,211,238,.18)}
.auth-chip-t{font-weight:600;color:#fff;font-size:.88rem;margin-bottom:1px}
.auth-chip-s{font-size:.75rem;color:rgba(255,255,255,.45)}
.auth-right{width:460px;min-width:460px;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:48px 42px;background:var(--surf);transition:background .25s}
.auth-ri{width:100%;max-width:360px}
.auth-logo-row{display:flex;align-items:center;gap:10px;margin-bottom:28px;animation:slideDown .4s ease}
.auth-logo-sq{width:38px;height:38px;background:var(--blue);border-radius:10px;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow-b)}
.auth-logo-sq svg{width:21px;height:21px;fill:#fff}
.auth-logo-name{font-size:1.25rem;font-weight:800;color:var(--text)}
.auth-tabs{display:flex;background:var(--surf3);border-radius:10px;padding:4px;gap:3px;margin-bottom:22px;animation:slideUp .4s .12s ease both}
.auth-tab{flex:1;padding:9px;border-radius:8px;border:none;background:transparent;color:var(--muted);font-weight:600;font-size:.86rem;cursor:pointer;transition:all .2s}
.auth-tab.active{background:var(--surf);color:var(--blue);box-shadow:var(--shadow-sm)}
.btn-google{width:100%;padding:12px;background:var(--surf);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-weight:600;font-size:.9rem;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:all .2s;box-shadow:var(--shadow-sm);margin-bottom:16px;animation:slideUp .4s .18s ease both}
.btn-google:hover{border-color:var(--blue);background:var(--bdim);box-shadow:var(--shadow)}
.g-svg{width:20px;height:20px;flex-shrink:0}
.divider-or{display:flex;align-items:center;gap:11px;margin-bottom:16px;color:var(--muted);font-size:.74rem;font-weight:500;animation:fadeIn .4s .22s ease both}
.divider-or::before,.divider-or::after{content:'';flex:1;height:1px;background:var(--border)}
.auth-forms{animation:slideUp .4s .26s ease both}
.auth-title{font-size:1.6rem;font-weight:800;margin-bottom:4px;color:var(--text)}
.auth-sub-t{color:var(--muted);font-size:.87rem;margin-bottom:22px}
.auth-foot{text-align:center;margin-top:16px;font-size:.81rem;color:var(--muted)}
.auth-foot a{color:var(--blue);text-decoration:none;cursor:pointer;font-weight:600}
.auth-foot a:hover{text-decoration:underline}

/* ════ TRUSTED DEVICE WARNING (Feature 5) ════ */
.trust-alert{
  background:rgba(217,119,6,.08);border:1.5px solid rgba(217,119,6,.3);
  border-radius:12px;padding:14px 16px;margin-bottom:14px;
  animation:slideDown .3s ease;display:none;
}
.trust-alert.show{display:block}
.trust-alert-title{font-weight:700;color:var(--amber);margin-bottom:5px;font-size:.88rem;display:flex;align-items:center;gap:7px}
.trust-alert-sub{font-size:.8rem;color:var(--sub);line-height:1.6}

/* ════════════════════════════════════
   MASTER PASSWORD
════════════════════════════════════ */
#view-master{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:20px;transition:background .25s}
.master-card{width:100%;max-width:450px;background:var(--surf);border:1px solid var(--border);border-radius:22px;padding:38px;box-shadow:var(--shadow-lg);animation:slideUp .5s ease;text-align:center}
.master-ico{width:86px;height:86px;margin:0 auto 22px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--purple));display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow-b);animation:float 4s ease-in-out infinite}
.master-ico svg{width:42px;height:42px;fill:#fff}
.master-title{font-size:1.55rem;font-weight:800;margin-bottom:7px;color:var(--text)}
.master-sub{color:var(--sub);font-size:.88rem;line-height:1.7;margin-bottom:22px;max-width:340px;margin-inline:auto}
.enc-box{display:flex;align-items:flex-start;gap:11px;padding:13px 15px;background:rgba(5,150,105,.07);border:1px solid rgba(5,150,105,.22);border-radius:10px;font-size:.8rem;color:var(--sub);text-align:left;margin-bottom:20px;line-height:1.6}
.enc-box strong{color:var(--green)}

/* ════════════════════════════════════
   TOPBAR
════════════════════════════════════ */
#view-vault,#view-settings{display:flex;flex-direction:column;height:100vh;overflow:hidden}
.topbar{height:58px;display:flex;align-items:center;padding:0 18px;gap:12px;background:var(--topbg);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;flex-shrink:0;transition:background .25s}
.topbar-brand{display:flex;align-items:center;gap:9px;cursor:pointer;text-decoration:none}
.topbar-logo{width:32px;height:32px;background:var(--blue);border-radius:8px;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow-b);transition:transform .18s}
.topbar-brand:hover .topbar-logo{transform:scale(1.08)}
.topbar-logo svg{width:18px;height:18px;fill:#fff}
.topbar-name{font-size:1.05rem;font-weight:800;color:var(--text)}

/* Browser Nav Buttons (Feature 4) */
.nav-btns{display:flex;gap:4px}
.nav-btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:var(--surf);color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.95rem;transition:all .18s}
.nav-btn:hover:not(:disabled){background:var(--bdim);border-color:var(--blue);color:var(--blue)}
.nav-btn:disabled{opacity:.3;cursor:not-allowed}

.topbar-search{flex:1;max-width:340px;position:relative}
.topbar-search input{width:100%;padding:8px 13px 8px 36px;background:var(--surf3);border:1.5px solid transparent;border-radius:8px;color:var(--text);font-size:.86rem;outline:none;transition:all .2s}
.topbar-search input:focus{background:var(--surf);border-color:var(--blue);box-shadow:0 0 0 3px var(--bdim)}
.topbar-search input::placeholder{color:var(--muted)}
.ts-ico{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:.82rem;pointer-events:none}

.topbar-right{display:flex;align-items:center;gap:7px;margin-left:auto}
.btn-new-e{display:flex;align-items:center;gap:6px;padding:8px 15px;background:var(--blue);color:#fff;border:none;border-radius:9px;font-weight:700;font-size:.83rem;cursor:pointer;transition:all .2s;box-shadow:var(--shadow-b);white-space:nowrap}
.btn-new-e:hover{background:var(--blue2);transform:translateY(-1px)}
.tb-icon{width:36px;height:36px;border-radius:8px;border:1px solid var(--border);background:var(--surf);color:var(--sub);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.95rem;transition:all .18s}
.tb-icon:hover{background:var(--bdim);border-color:var(--blue);color:var(--blue)}
